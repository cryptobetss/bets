services:
  - type: web
    name: cryptobet
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true        # Render auto-generates a secure random value
      - key: ADMIN_PASSWORD_HASH
        sync: false                # You set this manually in the Render dashboard
